services:
  joes-custom-flags-cms:
    image: ${REGISTRY}/${IMAGE}:latest
    container_name: joes-custom-flags-cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3015:8080"
    env_file: .production-env
    volumes:
      - /share/Public/docker/joes-custom-flags-cms/app-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: joes-custom-flags-cms-postgres
    restart: unless-stopped
    env_file: .production-env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - /share/Public/docker/joes-custom-flags-cms/postgres-data-v2/db:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: joes-custom-flags-cms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .production-env
    volumes:
      - /share/Public/docker/joes-custom-flags-cms/minio:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: joes-custom-flags-cms-minio-init
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      /usr/bin/mc mb -p local/joes-custom-flags-cms-media || true;
      /usr/bin/mc anonymous set download local/joes-custom-flags-cms-media || true;
      "
    env_file: .production-env
